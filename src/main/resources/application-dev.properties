
#server port
server.port=9090
#DB configurations

# Database URL
spring.datasource.url=jdbc:postgresql://localhost:5432/SmartHostel

# Credentials
spring.datasource.username=postgres
spring.datasource.password=developer

# Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Show SQL
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

#Connection pool configurations
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.leak-detection-threshold=2000
spring.datasource.hikari.pool-name=HikariPool-SmartHostel

#JWT Security Configurations
security.jwt.secret-key=kpY0l8oGVeA4YgQNSy357WgTTWWetsbnVD8gBXpxzu8
security.jwt.expiration-time=3600000

# ===============================
# MAIL CONFIGURATION
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# ===============================
# SMTP PROPERTIES
# ===============================
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===============================
# DEBUG (Disable in production)
# ===============================
#spring.mail.properties.mail.debug=false

# ===============================
# FILE UPLOAD & ENCRYPTION
# ===============================
# Path to store tenant documents
file.upload-dir=uploads/
# AES 256-bit Key for encryption (32 bytes encoded in Base64 for safety. 
# You can generate a new one using: openssl rand -base64 32)
